name: Publish signed desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Verify release tag and application version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${version}"

  prepare-release:
    needs: verify-version
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7
      - name: Create or locate the release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          release_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.tag_name == \"${tag}\") | .id" | sort -n | head -1
          )"

          if [[ -z "$release_id" ]]; then
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "Writing Environment ${tag}" \
              --notes-file .github/release-notes.md
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .id)"
          fi

          echo "release_id=${release_id}" >>"$GITHUB_OUTPUT"

  publish:
    needs:
      - verify-version
      - prepare-release
    strategy:
      fail-fast: false
      # Each job merges its platform into latest.json. Serial uploads prevent
      # concurrent jobs from replacing that file with stale platform data.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app
            rust_targets: aarch64-apple-darwin
            linux: false
            raspberry_pi: false
            apple_identity: "-"
            macos: true
          - platform: ubuntu-22.04
            args: --bundles deb
            rust_targets: ""
            linux: true
            raspberry_pi: false
            apple_identity: ""
            macos: false
          - platform: ubuntu-22.04-arm
            args: --bundles deb
            rust_targets: ""
            linux: true
            raspberry_pi: true
            apple_identity: ""
            macos: false
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux build dependencies
        if: matrix.linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev patchelf xdg-utils file
      - uses: pnpm/action-setup@v6
        with:
          version: 10.17.1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: ${{ matrix.apple_identity }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          releaseBody: |
            Begins the unified-library milestone with a persistent project registry and real nested folder navigation. The active project now expands directly in the Projects sidebar, and folders such as Research/Locations retain their hierarchy instead of being flattened.

            Selecting a parent folder includes sheets from its descendants. Creating and moving sheets now accepts safe nested project paths while rejecting paths that could escape the project. Existing projects, Markdown files, sync profiles, History, and Trash remain compatible.

            Signed desktop release for macOS Apple Silicon, Linux amd64, and Raspberry Pi ARM64.

            This is a personal project under active development. Back up important writing and review the release notes before updating.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }}
      - name: Package the macOS manual bootstrap app
        if: matrix.macos
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          app="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Writing Environment.app"
          archive="Writing-Environment-macOS-${version}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$archive"
          shasum -a 256 "$archive" >"$archive.sha256"
          gh release upload "v${version}" "$archive" "$archive.sha256" --clobber
      - name: Package the Raspberry Pi manual bootstrap kit
        if: matrix.raspberry_pi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          version="$(node -p "require('./package.json').version")"
          output="artifacts/pi-arm64/github-${GITHUB_RUN_NUMBER}"
          scripts/pi/package-artifact.sh "$output" "github-${GITHUB_RUN_NUMBER}"
          archive="$(find "$output" -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          pnpm tauri signer sign "$archive"
          gh release upload "v${version}" "$archive" "$archive.sha256" "$archive.sig" --clobber
